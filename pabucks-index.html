<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pa Bucks — Classroom Economy</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f1ec;--surface:#fff;--border:#e4dfd8;--text:#1a1a1a;--dim:#8a8478;--accent:#1a6b4a;--accent-light:#e8f5ee;--accent2:#d4a020;--accent2-light:#fef8e8;--red:#c03030;--red-light:#fde8e8;--blue:#2060c0;--blue-light:#e8f0ff;--card:#fff;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh}
.screen{display:none;min-height:100vh}.screen.active{display:block}

/* NAV */
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topnav .logo{font-weight:800;font-size:1.2rem;color:var(--accent);margin-right:auto;display:flex;align-items:center;gap:6px}
.topnav .logo span{background:var(--accent);color:#fff;padding:2px 8px;border-radius:6px;font-size:.75rem}
.nav-user{font-size:.85rem;color:var(--dim);font-weight:600}
.nav-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:'Sora',sans-serif;font-weight:600;font-size:.8rem;cursor:pointer;transition:all .15s;color:var(--text)}.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.red{border-color:var(--red);color:var(--red)}.nav-btn.red:hover{background:var(--red-light)}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f5ee,#f4f1ec,#fef8e8)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.login-logo{font-weight:800;font-size:2.5rem;color:var(--accent);margin-bottom:4px}
.login-logo .pb{background:var(--accent);color:#fff;padding:2px 12px;border-radius:8px;font-size:1.2rem;margin-left:6px}
.login-sub{color:var(--dim);font-size:.9rem;margin-bottom:28px}
.login-card .fg{margin-bottom:16px;text-align:left}
.fg label{display:block;font-size:.7rem;color:var(--dim);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Sora',sans-serif;font-size:.9rem;outline:none;background:var(--bg);color:var(--text);transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border:none;border-radius:var(--radius);font-family:'Sora',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#15573d}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--red);color:#fff}
.btn-gold{background:var(--accent2);color:#fff}
.btn-block{width:100%}
.btn-sm{padding:7px 14px;font-size:.78rem}
.btn+.btn{margin-left:6px}

/* ADMIN DASHBOARD */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:24px}
.account-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow);transition:all .15s}
.account-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.ac-type{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:8px}
.ac-type.personal{background:var(--blue-light);color:var(--blue)}
.ac-type.business{background:var(--accent2-light);color:var(--accent2)}
.ac-name{font-weight:800;font-size:1.1rem;margin-bottom:4px}
.ac-balance{font-family:'Space Mono',monospace;font-size:1.3rem;color:var(--accent);font-weight:700}
.ac-balance .pb{font-size:.8rem;color:var(--dim);font-weight:400}
.ac-owner{font-size:.75rem;color:var(--dim);margin-top:6px}
.ac-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.add-card{background:var(--bg);border:2px dashed var(--border);border-radius:16px;display:flex;align-items:center;justify-content:center;min-height:160px;cursor:pointer;transition:all .15s;flex-direction:column;gap:8px;color:var(--dim);font-weight:600}
.add-card:hover{border-color:var(--accent);color:var(--accent)}
.add-card .plus{font-size:2.5rem;line-height:1}

/* WALLET VIEW */
.wallet-header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.wh-name{font-weight:800;font-size:1.3rem}.wh-type{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:6px}
.wh-type.personal{background:var(--blue-light);color:var(--blue)}.wh-type.business{background:var(--accent2-light);color:var(--accent2)}
.wh-balance{margin-left:auto;text-align:right}
.wh-balance .amount{font-family:'Space Mono',monospace;font-size:1.8rem;color:var(--accent);font-weight:700}
.wh-balance .label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

.wallet-body{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:24px}
@media(max-width:768px){.wallet-body{grid-template-columns:1fr}}

.tx-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.tx-panel h3{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.tx-panel h3 .dot{width:8px;height:8px;border-radius:50%}
.tx-panel h3 .dot.green{background:var(--accent)}.tx-panel h3 .dot.red{background:var(--red)}
.tx-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.tx-item{display:grid;grid-template-columns:1fr auto;gap:4px;padding:10px 12px;background:var(--bg);border-radius:10px;font-size:.82rem}
.tx-item .tx-who{font-weight:600}.tx-item .tx-date{font-size:.7rem;color:var(--dim)}
.tx-item .tx-amount{font-family:'Space Mono',monospace;font-weight:700;text-align:right}
.tx-item .tx-amount.incoming{color:var(--accent)}.tx-item .tx-amount.outgoing{color:var(--red)}
.tx-empty{color:var(--dim);font-size:.85rem;text-align:center;padding:20px}

/* SHOP */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px 0}
.shop-item{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.shop-item .si-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.shop-item .si-price{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;font-size:1.1rem;margin-bottom:10px}
.shop-item .si-price .pb{font-size:.75rem;color:var(--dim)}
.btn-buy{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-family:'Sora',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;width:100%;transition:all .15s}
.btn-buy:hover{background:#15573d}
.shop-add{background:var(--bg);border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;min-height:120px;cursor:pointer;color:var(--dim);font-weight:600;flex-direction:column;gap:4px;transition:all .15s}
.shop-add:hover{border-color:var(--accent);color:var(--accent)}

.wallet-actions{padding:0 24px 24px;display:flex;gap:10px;flex-wrap:wrap}

/* BROWSE SHOPS */
.shops-list{padding:24px}
.shop-biz-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.shop-biz-card h3{font-weight:800;font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.shop-biz-card h3 .tag{font-size:.65rem;font-weight:700;background:var(--accent2-light);color:var(--accent2);padding:3px 8px;border-radius:6px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:28px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.modal h3{font-weight:800;font-size:1.1rem;margin-bottom:16px}
.modal .fg{margin-bottom:14px}
.modal-actions{display:flex;gap:8px;margin-top:8px}

.toast-box{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;box-shadow:var(--shadow);animation:slideIn .3s;font-weight:600}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-logo">Pa<span class="pb">Bucks</span></div>
    <div class="login-sub">Classroom Economy System</div>
    <div class="fg"><label>Username</label><input id="login-user" placeholder="Enter your username"></div>
    <div class="fg"><label>Password</label><input id="login-pass" type="password" placeholder="Enter password"></div>
    <button class="btn btn-primary btn-block" onclick="doLogin()" style="margin-bottom:10px">Log In</button>
    <div id="login-error" style="color:var(--red);font-size:.8rem;min-height:20px"></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-screen" class="screen">
  <div class="topnav">
    <div class="logo">Pa<span>Bucks</span> Admin</div>
    <button class="nav-btn" onclick="showBrowseShops()">🛒 Browse Shops</button>
    <button class="nav-btn red" onclick="logout()">Logout</button>
  </div>
  <div class="admin-grid" id="admin-grid"></div>
</div>

<!-- USER DASHBOARD (sees own wallets) -->
<div id="user-screen" class="screen">
  <div class="topnav">
    <div class="logo">Pa<span>Bucks</span></div>
    <span class="nav-user" id="user-nav-name"></span>
    <button class="nav-btn" onclick="showBrowseShops()">🛒 Browse Shops</button>
    <button class="nav-btn red" onclick="logout()">Logout</button>
  </div>
  <div id="user-wallets"></div>
</div>

<!-- WALLET VIEW -->
<div id="wallet-screen" class="screen">
  <div class="topnav">
    <div class="logo">Pa<span>Bucks</span></div>
    <button class="nav-btn" onclick="goBack()">← Back</button>
    <button class="nav-btn" onclick="showBrowseShops()">🛒 Shops</button>
    <button class="nav-btn red" onclick="logout()">Logout</button>
  </div>
  <div class="wallet-header" id="wallet-header"></div>
  <div class="wallet-actions" id="wallet-actions"></div>
  <div class="wallet-body" id="wallet-body"></div>
  <div id="wallet-shop"></div>
</div>

<!-- BROWSE SHOPS -->
<div id="shops-screen" class="screen">
  <div class="topnav">
    <div class="logo">Pa<span>Bucks</span></div>
    <button class="nav-btn" onclick="goBack()">← Back</button>
    <button class="nav-btn red" onclick="logout()">Logout</button>
  </div>
  <div class="shops-list" id="shops-list"></div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"><h3 id="m-title"></h3><div id="m-body"></div><div class="modal-actions" id="m-actions"></div></div></div>
<div class="toast-box" id="toast-box"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database();
const ROOT='pabucks';

let currentUser=null; // {username, isAdmin}
let currentWallet=null; // wallet id being viewed
let previousScreen=null;
let allData=null; // cached from firebase

// ═══ SCREENS ═══
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ═══ FIREBASE LISTENER ═══
function startListening(){
  db.ref(ROOT).on('value',snap=>{
    allData=snap.val()||{accounts:{},users:{},transactions:{}};
    renderCurrentScreen();
  });
}

function renderCurrentScreen(){
  if(!currentUser)return;
  if(currentUser.isAdmin){renderAdmin()}
  else{renderUserDashboard()}
  if(currentWallet)renderWallet(currentWallet);
  if(document.getElementById('shops-screen').classList.contains('active'))renderBrowseShops();
}

// ═══ LOGIN ═══
async function doLogin(){
  const user=document.getElementById('login-user').value.trim().toLowerCase();
  const pass=document.getElementById('login-pass').value.trim();
  if(!user||!pass){document.getElementById('login-error').textContent='Fill in both fields';return}

  // Check admin
  if(user==='admin'&&pass==='admin123'){
    currentUser={username:'admin',isAdmin:true};
    show('admin-screen');startListening();return;
  }

  // Check user accounts
  const snap=await db.ref(ROOT+'/users/'+user).once('value');
  const userData=snap.val();
  if(!userData){document.getElementById('login-error').textContent='User not found';return}
  if(userData.pass!==pass){document.getElementById('login-error').textContent='Wrong password';return}

  currentUser={username:user,isAdmin:false,displayName:userData.name};
  document.getElementById('user-nav-name').textContent=userData.name;
  show('user-screen');startListening();
}

function logout(){
  currentUser=null;currentWallet=null;previousScreen=null;
  db.ref(ROOT).off();
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  show('login-screen');
}

function goBack(){
  if(previousScreen){show(previousScreen);previousScreen=null;currentWallet=null}
  else if(currentUser?.isAdmin)show('admin-screen');
  else show('user-screen');
}

// ═══ ADMIN DASHBOARD ═══
function renderAdmin(){
  const grid=document.getElementById('admin-grid');grid.innerHTML='';
  const accounts=allData?.accounts||{};
  Object.entries(accounts).sort((a,b)=>a[1].name.localeCompare(b[1].name)).forEach(([id,acc])=>{
    const card=document.createElement('div');card.className='account-card';
    card.innerHTML=`
      <span class="ac-type ${acc.type}">${acc.type}</span>
      <div class="ac-name">${acc.name}</div>
      <div class="ac-balance">${(acc.balance||0).toLocaleString()} <span class="pb">PB</span></div>
      ${acc.owner?`<div class="ac-owner">Owner: ${acc.ownerName||acc.owner}</div>`:'<div class="ac-owner">No owner assigned</div>'}
      <div class="ac-actions">
        <button class="btn btn-sm btn-outline" onclick="openWallet('${id}')">Open</button>
        <button class="btn btn-sm btn-outline" onclick="showTransferOwner('${id}')">Transfer</button>
        <button class="btn btn-sm btn-outline" onclick="showAddFunds('${id}')">Add PB</button>
        <button class="btn btn-sm btn-danger" onclick="deleteAccount('${id}')">Delete</button>
      </div>`;
    grid.appendChild(card);
  });
  // Add card
  const add=document.createElement('div');add.className='add-card';add.onclick=()=>showCreateAccount();
  add.innerHTML=`<div class="plus">+</div>Create Account`;
  grid.appendChild(add);
}

// ═══ USER DASHBOARD ═══
function renderUserDashboard(){
  const container=document.getElementById('user-wallets');container.innerHTML='';
  const accounts=allData?.accounts||{};
  let hasWallets=false;
  const grid=document.createElement('div');grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:24px';

  Object.entries(accounts).forEach(([id,acc])=>{
    if(acc.owner!==currentUser.username)return;
    hasWallets=true;
    const card=document.createElement('div');card.className='account-card';card.style.cursor='pointer';
    card.onclick=()=>openWallet(id);
    card.innerHTML=`
      <span class="ac-type ${acc.type}">${acc.type}</span>
      <div class="ac-name">${acc.name}</div>
      <div class="ac-balance">${(acc.balance||0).toLocaleString()} <span class="pb">PB</span></div>`;
    grid.appendChild(card);
  });

  if(!hasWallets){
    container.innerHTML='<div style="text-align:center;padding:60px;color:var(--dim)"><div style="font-size:2rem;margin-bottom:8px">📭</div>No wallets yet. Ask your admin to create one for you.</div>';
  }else{container.appendChild(grid)}
}

// ═══ WALLET VIEW ═══
function openWallet(walletId){
  currentWallet=walletId;
  previousScreen=currentUser.isAdmin?'admin-screen':'user-screen';
  show('wallet-screen');
  renderWallet(walletId);
}

function renderWallet(walletId){
  const acc=(allData?.accounts||{})[walletId];
  if(!acc)return;

  // Header
  const header=document.getElementById('wallet-header');
  header.innerHTML=`
    <span class="wh-type ${acc.type}">${acc.type}</span>
    <div class="wh-name">${acc.name}</div>
    <div class="wh-balance"><div class="label">Balance</div><div class="amount">${(acc.balance||0).toLocaleString()} PB</div></div>`;

  // Actions
  const actions=document.getElementById('wallet-actions');actions.innerHTML='';
  const canEdit=currentUser.isAdmin||(acc.owner===currentUser.username);
  if(canEdit){
    actions.innerHTML=`
      <button class="btn btn-primary btn-sm" onclick="showSendMoney('${walletId}')">💸 Send PB</button>
      ${acc.type==='business'?`<button class="btn btn-gold btn-sm" onclick="showShopManager('${walletId}')">🛒 Manage Shop</button>`:''}`;
  }

  // Transaction panels
  const body=document.getElementById('wallet-body');body.innerHTML='';
  const txs=Object.values(allData?.transactions||{}).filter(tx=>tx.from===walletId||tx.to===walletId).sort((a,b)=>b.date-a.date);

  const incoming=txs.filter(tx=>tx.to===walletId);
  const outgoing=txs.filter(tx=>tx.from===walletId);

  // Incoming panel
  const inPanel=document.createElement('div');inPanel.className='tx-panel';
  inPanel.innerHTML=`<h3><span class="dot green"></span> Money In</h3><div class="tx-list">${incoming.length?incoming.map(tx=>`
    <div class="tx-item"><div><div class="tx-who">From: ${getAccName(tx.from)}</div><div class="tx-date">${new Date(tx.date).toLocaleDateString()} · ${tx.note||tx.type||'Transfer'}</div></div><div class="tx-amount incoming">+${tx.amount} PB</div></div>`).join(''):'<div class="tx-empty">No incoming transactions</div>'}</div>`;
  body.appendChild(inPanel);

  // Outgoing panel
  const outPanel=document.createElement('div');outPanel.className='tx-panel';
  outPanel.innerHTML=`<h3><span class="dot red"></span> Money Out</h3><div class="tx-list">${outgoing.length?outgoing.map(tx=>`
    <div class="tx-item"><div><div class="tx-who">To: ${getAccName(tx.to)}</div><div class="tx-date">${new Date(tx.date).toLocaleDateString()} · ${tx.note||tx.type||'Transfer'}</div></div><div class="tx-amount outgoing">-${tx.amount} PB</div></div>`).join(''):'<div class="tx-empty">No outgoing transactions</div>'}</div>`;
  body.appendChild(outPanel);

  // Shop (if business)
  const shopArea=document.getElementById('wallet-shop');shopArea.innerHTML='';
  if(acc.type==='business'&&canEdit){
    const products=acc.products||{};
    let html=`<div style="padding:0 24px 24px"><h3 style="font-weight:800;margin-bottom:4px">🛒 Your Shop</h3><div class="shop-grid">`;
    Object.entries(products).forEach(([pid,prod])=>{
      html+=`<div class="shop-item"><div class="si-name">${prod.name}</div><div class="si-price">${prod.price} <span class="pb">PB</span></div><button class="btn btn-sm btn-danger" onclick="removeProduct('${walletId}','${pid}')">Remove</button></div>`;
    });
    html+=`<div class="shop-add" onclick="showAddProduct('${walletId}')"><div style="font-size:1.5rem">+</div>Add Product</div></div></div>`;
    shopArea.innerHTML=html;
  }
}

function getAccName(id){return(allData?.accounts||{})[id]?.name||'Unknown'}

// ═══ BROWSE SHOPS ═══
function showBrowseShops(){
  previousScreen=currentUser.isAdmin?'admin-screen':'user-screen';
  show('shops-screen');
  renderBrowseShops();
}

function renderBrowseShops(){
  const list=document.getElementById('shops-list');list.innerHTML='<h2 style="font-weight:800;margin-bottom:16px">🛒 All Shops</h2>';
  const accounts=allData?.accounts||{};
  let hasShops=false;

  Object.entries(accounts).forEach(([id,acc])=>{
    if(acc.type!=='business')return;
    const products=acc.products||{};
    if(!Object.keys(products).length)return;
    hasShops=true;

    const card=document.createElement('div');card.className='shop-biz-card';
    let html=`<h3>${acc.name} <span class="tag">Business</span></h3><div class="shop-grid">`;
    Object.entries(products).forEach(([pid,prod])=>{
      html+=`<div class="shop-item"><div class="si-name">${prod.name}</div><div class="si-price">${prod.price} <span class="pb">PB</span></div><button class="btn-buy" onclick="buyProduct('${id}','${pid}')">Buy Now</button></div>`;
    });
    html+=`</div>`;card.innerHTML=html;list.appendChild(card);
  });

  if(!hasShops)list.innerHTML+='<div style="text-align:center;padding:40px;color:var(--dim)">No shops available yet.</div>';
}

// ═══ BUY PRODUCT ═══
async function buyProduct(bizId,productId){
  if(!currentUser||currentUser.isAdmin)return toast('Log in as a user to buy');
  const accounts=allData?.accounts||{};
  const biz=accounts[bizId];
  const product=biz?.products?.[productId];
  if(!product)return toast('Product not found');

  // Find buyer's personal wallet
  const myWallets=Object.entries(accounts).filter(([id,acc])=>acc.owner===currentUser.username&&acc.type==='personal');
  if(!myWallets.length)return toast("You don't have a personal wallet");
  const[myWalletId,myWallet]=myWallets[0];

  if(myWallet.balance<product.price)return toast("Not enough PB! Need "+product.price);

  // Deduct from buyer, add to business
  const updates={};
  updates[ROOT+'/accounts/'+myWalletId+'/balance']=myWallet.balance-product.price;
  updates[ROOT+'/accounts/'+bizId+'/balance']=(biz.balance||0)+product.price;

  // Log transaction
  const txId='tx_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  updates[ROOT+'/transactions/'+txId]={
    from:myWalletId,to:bizId,amount:product.price,
    type:'Purchase',note:'Bought: '+product.name,
    date:Date.now()
  };

  await db.ref().update(updates);
  toast('Bought '+product.name+' for '+product.price+' PB!');
}

// ═══ SEND MONEY ═══
function showSendMoney(fromId){
  const accounts=allData?.accounts||{};
  const fromAcc=accounts[fromId];
  let opts='';
  Object.entries(accounts).forEach(([id,acc])=>{
    if(id===fromId)return;
    opts+=`<option value="${id}">${acc.name} (${acc.type})</option>`;
  });

  showModal('Send PB',`
    <p style="color:var(--dim);font-size:.85rem;margin-bottom:12px">From: <strong>${fromAcc.name}</strong> · Balance: ${fromAcc.balance} PB</p>
    <div class="fg"><label>To</label><select id="send-to">${opts}</select></div>
    <div class="fg"><label>Amount</label><input id="send-amount" type="number" min="1" placeholder="Enter amount"></div>
    <div class="fg"><label>Note (optional)</label><input id="send-note" placeholder="What's this for?"></div>
  `,[{t:'Send',c:'btn-primary',fn:async()=>{
    const to=document.getElementById('send-to').value;
    const amount=parseInt(document.getElementById('send-amount').value);
    const note=document.getElementById('send-note').value.trim();
    if(!to||!amount||amount<1)return toast('Fill in all fields');
    if(amount>fromAcc.balance)return toast('Not enough PB!');
    const toAcc=accounts[to];
    const updates={};
    updates[ROOT+'/accounts/'+fromId+'/balance']=fromAcc.balance-amount;
    updates[ROOT+'/accounts/'+to+'/balance']=(toAcc.balance||0)+amount;
    const txId='tx_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    updates[ROOT+'/transactions/'+txId]={from:fromId,to,amount,type:'Transfer',note:note||'Transfer',date:Date.now()};
    await db.ref().update(updates);closeModal();toast('Sent '+amount+' PB!');
  }},{t:'Cancel',c:'btn-outline',fn:closeModal}]);
}

// ═══ CREATE ACCOUNT ═══
function showCreateAccount(){
  showModal('Create Account',`
    <div class="fg"><label>Account Type</label><select id="new-type"><option value="personal">Personal Wallet</option><option value="business">Business Wallet</option></select></div>
    <div class="fg"><label>Account Name</label><input id="new-name" placeholder="e.g. Mohamed or Coffee Shop"></div>
    <div class="fg"><label>Starting Balance</label><input id="new-balance" type="number" value="0" min="0"></div>
    <div class="fg"><label>Owner Username (for login)</label><input id="new-owner" placeholder="e.g. mohamed"></div>
    <div class="fg"><label>Owner Password</label><input id="new-pass" placeholder="Set a password"></div>
  `,[{t:'Create',c:'btn-primary',fn:async()=>{
    const type=document.getElementById('new-type').value;
    const name=document.getElementById('new-name').value.trim();
    const balance=parseInt(document.getElementById('new-balance').value)||0;
    const owner=document.getElementById('new-owner').value.trim().toLowerCase();
    const pass=document.getElementById('new-pass').value.trim();
    if(!name)return toast('Enter a name');
    if(!owner||!pass)return toast('Enter owner username and password');
    const id='acc_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
    const updates={};
    updates[ROOT+'/accounts/'+id]={type,name,balance,owner,ownerName:name,products:{}};
    updates[ROOT+'/users/'+owner]={name,pass};
    await db.ref().update(updates);closeModal();toast('Account created!');
  }},{t:'Cancel',c:'btn-outline',fn:closeModal}]);
}

// ═══ TRANSFER OWNERSHIP ═══
function showTransferOwner(accId){
  const acc=(allData?.accounts||{})[accId];
  showModal('Transfer Ownership',`
    <p style="color:var(--dim);font-size:.85rem;margin-bottom:12px">Transfer <strong>${acc.name}</strong> to another user</p>
    <div class="fg"><label>New Owner Username</label><input id="transfer-owner" placeholder="e.g. noor"></div>
  `,[{t:'Transfer',c:'btn-primary',fn:async()=>{
    const newOwner=document.getElementById('transfer-owner').value.trim().toLowerCase();
    if(!newOwner)return toast('Enter a username');
    await db.ref(ROOT+'/accounts/'+accId+'/owner').set(newOwner);
    closeModal();toast('Ownership transferred!');
  }},{t:'Cancel',c:'btn-outline',fn:closeModal}]);
}

// ═══ ADD FUNDS ═══
function showAddFunds(accId){
  const acc=(allData?.accounts||{})[accId];
  showModal('Add PB',`
    <p style="color:var(--dim);font-size:.85rem;margin-bottom:12px">Add Pa Bucks to <strong>${acc.name}</strong> (current: ${acc.balance} PB)</p>
    <div class="fg"><label>Amount</label><input id="add-amount" type="number" min="1" placeholder="How much?"></div>
  `,[{t:'Add',c:'btn-primary',fn:async()=>{
    const amount=parseInt(document.getElementById('add-amount').value)||0;
    if(amount<1)return toast('Enter an amount');
    await db.ref(ROOT+'/accounts/'+accId+'/balance').set((acc.balance||0)+amount);
    closeModal();toast('Added '+amount+' PB!');
  }},{t:'Cancel',c:'btn-outline',fn:closeModal}]);
}

// ═══ DELETE ACCOUNT ═══
async function deleteAccount(accId){
  if(!confirm('Delete this account? This cannot be undone.'))return;
  await db.ref(ROOT+'/accounts/'+accId).remove();
  toast('Account deleted');
}

// ═══ SHOP MANAGEMENT ═══
function showShopManager(walletId){
  showAddProduct(walletId);
}

function showAddProduct(walletId){
  showModal('Add Product',`
    <div class="fg"><label>Product Name</label><input id="prod-name" placeholder="e.g. Chips, Free Period"></div>
    <div class="fg"><label>Price (PB)</label><input id="prod-price" type="number" min="1" placeholder="Price in Pa Bucks"></div>
  `,[{t:'Add Product',c:'btn-primary',fn:async()=>{
    const name=document.getElementById('prod-name').value.trim();
    const price=parseInt(document.getElementById('prod-price').value)||0;
    if(!name||price<1)return toast('Fill in both fields');
    const pid='prod_'+Date.now();
    await db.ref(ROOT+'/accounts/'+walletId+'/products/'+pid).set({name,price});
    closeModal();toast('Product added!');
  }},{t:'Cancel',c:'btn-outline',fn:closeModal}]);
}

async function removeProduct(walletId,productId){
  if(!confirm('Remove this product?'))return;
  await db.ref(ROOT+'/accounts/'+walletId+'/products/'+productId).remove();
  toast('Product removed');
}

// ═══ HELPERS ═══
function toast(m){const c=document.getElementById('toast-box'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),3000)}
function showModal(title,body,btns){
  document.getElementById('m-title').textContent=title;document.getElementById('m-body').innerHTML=body;
  const a=document.getElementById('m-actions');a.innerHTML='';
  (btns||[]).forEach(b=>{const btn=document.createElement('button');btn.className='btn '+(b.c||'btn-primary');btn.textContent=b.t;btn.onclick=b.fn;a.appendChild(btn)});
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open')}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
</script>
